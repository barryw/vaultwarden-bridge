when:
  - event: push

labels:
  platform: linux/amd64

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      tags: true

steps:
  - name: validate-commits
    image: rust:1.94.0-bookworm
    commands:
      - cargo install cocogitto --locked
      - cog check
      - echo "All commits follow conventional commit format"
