when:
  - event: [push, pull_request]

labels:
  platform: linux/amd64

services:
  - name: postgres
    image: postgres:17
    environment:
      POSTGRES_USER: bridge
      POSTGRES_PASSWORD: bridge
      POSTGRES_DB: vaultwarden_bridge

  - name: vaultwarden
    image: vaultwarden/server:latest
    ports:
      - 80
    environment:
      DOMAIN: http://vaultwarden
      SIGNUPS_ALLOWED: "true"
      ROCKET_PORT: "80"
      WEB_VAULT_ENABLED: "false"
      I_REALLY_WANT_VOLATILE_STORAGE: "true"

steps:
  - name: lint-test-build
    image: rust:1.94.0-bookworm
    commands:
      - cargo fmt --all -- --check
      - cargo clippy --workspace -- -D warnings
      - cargo test --workspace --lib
      - cargo build --workspace --release

  - name: seed-vaultwarden
    image: node:18-bookworm-slim
    environment:
      VAULTWARDEN_URL: http://vaultwarden:80
      TEST_EMAIL: bridge-test@example.com
      TEST_PASSWORD: TestPassword123!
      BW_NOINTERACTION: "true"
    commands:
      - apt-get update && apt-get install -y curl unzip postgresql-client > /dev/null 2>&1
      - curl -fsSL "https://github.com/bitwarden/clients/releases/download/cli-v2024.4.0/bw-linux-2024.4.0.zip" -o /tmp/bw.zip
      - unzip /tmp/bw.zip -d /usr/local/bin && chmod +x /usr/local/bin/bw
      - |
        echo "==> Waiting for Vaultwarden..."
        for i in $(seq 1 60); do
          curl -sf http://vaultwarden:80/alive > /dev/null 2>&1 && break
          [ "$i" -eq 60 ] && echo "Vaultwarden not ready" && exit 1
          sleep 1
        done
        echo "==> Vaultwarden is ready"
      - |
        echo "==> Waiting for Postgres..."
        for i in $(seq 1 30); do
          pg_isready -h postgres -U bridge > /dev/null 2>&1 && break
          [ "$i" -eq 30 ] && echo "Postgres not ready" && exit 1
          sleep 1
        done
        echo "==> Postgres is ready"
      - node scripts/register-vaultwarden.js
    depends_on: [lint-test-build]

  - name: integration-test
    image: rust:1.94.0-bookworm
    environment:
      DATABASE_URL: postgres://bridge:bridge@postgres:5432/vaultwarden_bridge
      BW_SERVER_URL: http://vaultwarden
      BW_EMAIL: bridge-test@example.com
      BW_PASSWORD: TestPassword123!
      BW_SERVE_PORT: "8087"
      BRIDGE_ADMIN_USERNAME: admin
      BRIDGE_ADMIN_PASSWORD: testadmin123
      BRIDGE_UI_ALLOW_CIDRS: 0.0.0.0/0
      BRIDGE_API_ALLOW_CIDRS: 0.0.0.0/0
      RUST_LOG: info
      BRIDGE_LISTEN_PORT: "9090"
      TEST_BRIDGE_URL: http://127.0.0.1:9090
      BW_NOINTERACTION: "true"
    commands:
      - apt-get update && apt-get install -y curl unzip
      - curl -fsSL "https://github.com/bitwarden/clients/releases/download/cli-v2024.4.0/bw-linux-2024.4.0.zip" -o /tmp/bw.zip
      - unzip /tmp/bw.zip -d /usr/local/bin && chmod +x /usr/local/bin/bw
      - |
        echo "==> Starting bridge in background..."
        ./target/release/vaultwarden-bridge &
        BRIDGE_PID=$!
        echo "==> Waiting for bridge to be ready..."
        for i in $(seq 1 60); do
          curl -sf http://127.0.0.1:9090/api/v1/health > /dev/null 2>&1 && break
          [ "$i" -eq 60 ] && echo "Bridge not ready" && kill $BRIDGE_PID && exit 1
          sleep 1
        done
        echo "==> Bridge is ready"
        cargo test -p vaultwarden-bridge --test integration -- --test-threads=1
        EXIT_CODE=$?
        kill $BRIDGE_PID 2>/dev/null || true
        exit $EXIT_CODE
    depends_on: [seed-vaultwarden]
