when:
  - event: push
    branch: main

labels:
  platform: linux/amd64

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      tags: true
      depth: 0

depends_on:
  - test
  - commits

steps:
  - name: bump-version
    image: rust:1.94.0-bookworm
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - cargo install cocogitto --locked
      - |
        git config user.name "Woodpecker CI"
        git config user.email "ci@barrywalker.io"
        git remote set-url origin "https://x-access-token:$GITHUB_TOKEN@github.com/${CI_REPO}.git"
        git fetch origin main
        git checkout -B main origin/main
        cog bump --auto || { echo "No version bump needed"; exit 0; }
        git push -u origin main --follow-tags
        echo "Current version: $(cog get-version)"
