when:
  - event: push
    branch: main

labels:
  platform: linux/amd64

steps:
  - name: test
    image: rust:1.94.0-bookworm
    commands:
      - cargo fmt --all -- --check
      - cargo clippy --workspace -- -D warnings
      - cargo test --workspace --lib

  - name: docker-bridge
    image: gcr.io/kaniko-project/executor:debug
    environment:
      GHCR_USERNAME:
        from_secret: github_username
      GHCR_TOKEN:
        from_secret: github_token
    commands:
      - |
        SHORT_SHA=$(echo "$CI_COMMIT_SHA" | cut -c1-8)
        echo "Building bridge image: $SHORT_SHA"
        mkdir -p /kaniko/.docker
        echo "{\"auths\":{\"ghcr.io\":{\"username\":\"$GHCR_USERNAME\",\"password\":\"$GHCR_TOKEN\"}}}" > /kaniko/.docker/config.json
        /kaniko/executor \
          --context="$CI_WORKSPACE" \
          --dockerfile="$CI_WORKSPACE/Dockerfile" \
          --destination="ghcr.io/barryw/vaultwarden-bridge:$SHORT_SHA" \
          --destination="ghcr.io/barryw/vaultwarden-bridge:latest" \
          --cache=true \
          --cache-repo="ghcr.io/barryw/vaultwarden-bridge-cache"
    depends_on: [test]

  - name: docker-bw-serve
    image: gcr.io/kaniko-project/executor:debug
    environment:
      GHCR_USERNAME:
        from_secret: github_username
      GHCR_TOKEN:
        from_secret: github_token
    commands:
      - |
        echo "Building bw-serve sidecar image"
        mkdir -p /kaniko/.docker
        echo "{\"auths\":{\"ghcr.io\":{\"username\":\"$GHCR_USERNAME\",\"password\":\"$GHCR_TOKEN\"}}}" > /kaniko/.docker/config.json
        /kaniko/executor \
          --context="$CI_WORKSPACE" \
          --dockerfile="$CI_WORKSPACE/Dockerfile.bw-serve" \
          --destination="ghcr.io/barryw/vwb-bw-serve:latest" \
          --cache=true \
          --cache-repo="ghcr.io/barryw/vwb-bw-serve-cache"
    depends_on: [test]

  - name: deploy
    image: bitnami/kubectl:latest
    commands:
      - |
        SHORT_SHA=$(echo "$CI_COMMIT_SHA" | cut -c1-8)
        echo "Deploying vaultwarden-bridge:$SHORT_SHA"

        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/bw-appdata-configmap.yaml
        kubectl apply -f k8s/internal-ca-configmap.yaml
        kubectl apply -f k8s/service.yaml
        kubectl apply -f k8s/ingress.yaml
        kubectl apply -f k8s/deployment.yaml

        kubectl set image deployment/vaultwarden-bridge \
          vaultwarden-bridge=ghcr.io/barryw/vaultwarden-bridge:$SHORT_SHA \
          -n vaultwarden-bridge

        kubectl rollout status deployment/vaultwarden-bridge \
          -n vaultwarden-bridge --timeout=180s
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-agent
    depends_on: [docker-bridge, docker-bw-serve]
