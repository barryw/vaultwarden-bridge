when:
  - event: push
    branch: main
    evaluate: 'not (CI_COMMIT_MESSAGE contains "[skip ci]")'

labels:
  platform: linux/amd64

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      tags: true
      depth: 0

depends_on:
  - test
  - commits

steps:
  - name: bump
    image: rust:1.94.0-bookworm
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - |
        cargo install cocogitto --locked
        git config user.name "Woodpecker CI"
        git config user.email "ci@barrywalker.io"
        git remote set-url origin "https://x-access-token:$GITHUB_TOKEN@github.com/${CI_REPO}.git"
        git fetch origin main
        git checkout -B main origin/main

        cog bump --auto --skip-ci || { echo "No version bump needed — using current version"; }

        VERSION=$(cog get-version)
        echo "Version: $VERSION"
        echo "$VERSION" > .version

  - name: docker-bridge
    image: gcr.io/kaniko-project/executor:debug
    environment:
      GHCR_USERNAME:
        from_secret: github_username
      GHCR_TOKEN:
        from_secret: github_token
    commands:
      - |
        VERSION=$(cat .version)
        SHORT_SHA=$(echo "$CI_COMMIT_SHA" | cut -c1-8)
        echo "Building bridge image: v$VERSION ($SHORT_SHA)"
        mkdir -p /kaniko/.docker
        echo "{\"auths\":{\"ghcr.io\":{\"username\":\"$GHCR_USERNAME\",\"password\":\"$GHCR_TOKEN\"}}}" > /kaniko/.docker/config.json
        /kaniko/executor \
          --context="$CI_WORKSPACE" \
          --dockerfile="$CI_WORKSPACE/Dockerfile" \
          --destination="ghcr.io/barryw/vaultwarden-bridge:v$VERSION" \
          --destination="ghcr.io/barryw/vaultwarden-bridge:$SHORT_SHA" \
          --destination="ghcr.io/barryw/vaultwarden-bridge:latest" \
          --cache=true \
          --cache-repo="ghcr.io/barryw/vaultwarden-bridge-cache"
    depends_on: [bump]

  - name: docker-bw-serve
    image: gcr.io/kaniko-project/executor:debug
    environment:
      GHCR_USERNAME:
        from_secret: github_username
      GHCR_TOKEN:
        from_secret: github_token
    commands:
      - |
        echo "Building bw-serve sidecar image"
        mkdir -p /kaniko/.docker
        echo "{\"auths\":{\"ghcr.io\":{\"username\":\"$GHCR_USERNAME\",\"password\":\"$GHCR_TOKEN\"}}}" > /kaniko/.docker/config.json
        /kaniko/executor \
          --context="$CI_WORKSPACE" \
          --dockerfile="$CI_WORKSPACE/Dockerfile.bw-serve" \
          --destination="ghcr.io/barryw/vwb-bw-serve:latest" \
          --cache=true \
          --cache-repo="ghcr.io/barryw/vwb-bw-serve-cache"
    depends_on: [bump]

  - name: deploy
    image: bitnami/kubectl:latest
    commands:
      - |
        VERSION=$(cat .version)
        echo "Deploying vaultwarden-bridge:v$VERSION"

        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/bw-appdata-configmap.yaml
        kubectl apply -f k8s/internal-ca-configmap.yaml
        kubectl apply -f k8s/service.yaml
        kubectl apply -f k8s/ingress.yaml
        kubectl apply -f k8s/deployment.yaml

        kubectl set image deployment/vaultwarden-bridge \
          vaultwarden-bridge=ghcr.io/barryw/vaultwarden-bridge:v$VERSION \
          -n vaultwarden-bridge

        kubectl rollout status deployment/vaultwarden-bridge \
          -n vaultwarden-bridge --timeout=180s
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-agent
    depends_on: [docker-bridge, docker-bw-serve]

  - name: push-version
    image: rust:1.94.0-bookworm
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - |
        git config user.name "Woodpecker CI"
        git config user.email "ci@barrywalker.io"
        git remote set-url origin "https://x-access-token:$GITHUB_TOKEN@github.com/${CI_REPO}.git"
        git push -u origin main --follow-tags || echo "Nothing to push"
    depends_on: [deploy]
