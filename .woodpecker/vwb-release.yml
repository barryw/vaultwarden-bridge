when:
  - event: tag
    branch: main

labels:
  platform: linux/amd64

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      tags: true

steps:
  - name: build
    image: rust:1.94.0-bookworm
    commands:
      - |
        apt-get update && apt-get install -y gcc-aarch64-linux-gnu > /dev/null 2>&1
        rustup target add x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu

        # Linux amd64
        cargo build --release -p vwb --target x86_64-unknown-linux-gnu
        cp target/x86_64-unknown-linux-gnu/release/vwb vwb-linux-amd64

        # Linux arm64
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc \
          cargo build --release -p vwb --target aarch64-unknown-linux-gnu
        cp target/aarch64-unknown-linux-gnu/release/vwb vwb-linux-arm64

        sha256sum vwb-linux-* > SHA256SUMS
        cat SHA256SUMS

  - name: release
    image: ghcr.io/cocogitto/cog:latest
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - |
        apk add --no-cache github-cli > /dev/null 2>&1
        git config --global --add safe.directory "$CI_WORKSPACE"

        TAG=$(git describe --tags --abbrev=0)
        RELEASE_NOTES=$(cog changelog --at "$TAG" 2>/dev/null || echo "Release $TAG")

        gh release create "$TAG" \
          --repo "$CI_REPO" \
          --title "vaultwarden-bridge $TAG" \
          --notes "$RELEASE_NOTES" \
          2>/dev/null || echo "Release already exists"

        gh release upload "$TAG" \
          vwb-linux-amd64 \
          vwb-linux-arm64 \
          SHA256SUMS \
          --repo "$CI_REPO" --clobber
    depends_on: [build]
