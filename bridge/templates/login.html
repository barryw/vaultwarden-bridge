<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — Vaultwarden Bridge</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233b82f6'/><text x='50' y='68' text-anchor='middle' fill='white' font-family='sans-serif' font-size='48' font-weight='bold'>VB</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }
        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.05);
            width: 380px;
            max-width: 90vw;
        }
        .logo {
            display: flex; align-items: center; gap: 0.75rem;
            margin-bottom: 0.5rem;
        }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 1.1rem;
        }
        .logo h1 {
            font-size: 1.35rem; font-weight: 700; color: #0f172a;
            line-height: 1.2;
        }
        .subtitle {
            color: #64748b; font-size: 0.8rem; margin-top: 0.1rem;
        }
        .logo { margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block; margin-bottom: 0.4rem;
            font-weight: 500; font-size: 0.875rem; color: #374151;
        }
        .form-group input {
            width: 100%; padding: 0.7rem 0.85rem;
            border: 1.5px solid #d1d5db; border-radius: 8px;
            font-size: 0.95rem; color: #1f2937;
            transition: border-color 0.15s, box-shadow 0.15s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        button {
            width: 100%; padding: 0.75rem;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white; border: none; border-radius: 8px;
            font-size: 0.95rem; font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.15s;
            margin-top: 0.5rem;
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37,99,235,0.4);
        }
        button:active { transform: translateY(0); }
        .error {
            background: #fef2f2; color: #991b1b; border: 1px solid #fecaca;
            padding: 0.75rem; border-radius: 8px; margin-bottom: 1.25rem;
            font-size: 0.875rem;
        }
        .footer {
            margin-top: 2rem;
            color: rgba(255,255,255,0.3);
            font-size: 0.75rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon">VB</div>
            <div>
                <h1>Vaultwarden Bridge</h1>
                <p class="subtitle">Machine secret management</p>
            </div>
        </div>
        {% if let Some(err) = error %}
        <div class="error">{{ err }}</div>
        {% endif %}
        <form method="POST" action="/ui/login">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus placeholder="admin">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter password">
            </div>
            <button type="submit">Sign in</button>
        </form>
    </div>
    <div class="footer">Vaultwarden Bridge v{{ version }}</div>
</body>
</html>
